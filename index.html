<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>无线充电资料包 - 计算器 / 文档 / STM32 代码</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f4;
      --paper: #ffffff;
      --ink: #17211f;
      --muted: #67716d;
      --line: #d9dfdb;
      --accent: #0e7f73;
      --accent-2: #c85f2f;
      --code-bg: #111816;
      --code-ink: #e7f0eb;
      --soft: #edf4f1;
      --shadow: 0 18px 44px rgba(29, 43, 39, .08);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
      color: var(--ink);
      background:
        linear-gradient(140deg, rgba(14, 127, 115, .12), transparent 34%),
        linear-gradient(320deg, rgba(200, 95, 47, .10), transparent 32%),
        var(--bg);
    }

    button { font: inherit; }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      padding: 14px clamp(16px, 4vw, 42px);
      background: rgba(246, 247, 244, .92);
      border-bottom: 1px solid var(--line);
      backdrop-filter: blur(14px);
    }

    .brand {
      min-width: 210px;
    }

    .brand strong {
      display: block;
      font-size: 17px;
      letter-spacing: 0;
    }

    .brand span {
      display: block;
      margin-top: 2px;
      color: var(--muted);
      font-size: 12px;
    }

    .tabs {
      display: flex;
      gap: 6px;
      overflow-x: auto;
      padding: 2px;
    }

    .tab {
      border: 1px solid transparent;
      border-radius: 8px;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      padding: 9px 12px;
      white-space: nowrap;
      transition: background .18s ease, color .18s ease, border-color .18s ease;
    }

    .tab:hover {
      color: var(--ink);
      background: rgba(255, 255, 255, .7);
    }

    .tab.active {
      color: var(--ink);
      background: var(--paper);
      border-color: var(--line);
      box-shadow: 0 8px 20px rgba(29, 43, 39, .06);
    }

    main {
      width: min(1320px, calc(100% - 28px));
      margin: 0 auto;
      padding: 26px 0 42px;
    }

    .intro {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 24px;
      align-items: end;
      padding: 14px 0 24px;
      border-bottom: 1px solid var(--line);
    }

    h1 {
      margin: 0;
      font-size: clamp(30px, 4vw, 58px);
      line-height: 1.02;
      letter-spacing: 0;
    }

    .intro p {
      max-width: 820px;
      margin: 12px 0 0;
      color: var(--muted);
      line-height: 1.75;
      font-size: 15px;
    }

    .meta {
      display: grid;
      gap: 8px;
      min-width: 220px;
      color: var(--muted);
      font-size: 13px;
    }

    .meta span {
      display: flex;
      justify-content: space-between;
      gap: 18px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--line);
    }

    .section {
      display: none;
      padding-top: 22px;
    }

    .section.active {
      display: block;
      animation: rise .2s ease both;
    }

    @keyframes rise {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .calculator-frame {
      width: 100%;
      min-height: 78vh;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--paper);
      box-shadow: var(--shadow);
    }

    .doc-layout {
      display: grid;
      grid-template-columns: 240px minmax(0, 1fr);
      gap: 24px;
      align-items: start;
    }

    .doc-nav {
      position: sticky;
      top: 86px;
      display: grid;
      gap: 8px;
      padding: 14px 0;
      border-right: 1px solid var(--line);
    }

    .doc-nav button {
      width: calc(100% - 16px);
      border: 0;
      border-radius: 8px;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      padding: 10px 12px;
      text-align: left;
    }

    .doc-nav button:hover,
    .doc-nav button.active {
      background: var(--soft);
      color: var(--ink);
    }

    .doc {
      max-width: 930px;
      padding-bottom: 40px;
    }

    .doc h1, .doc h2, .doc h3 {
      letter-spacing: 0;
    }

    .doc h1 {
      font-size: clamp(30px, 4vw, 48px);
      margin: 8px 0 18px;
    }

    .doc h2 {
      margin: 36px 0 12px;
      padding-top: 4px;
      font-size: 26px;
      border-top: 1px solid var(--line);
    }

    .doc h3 {
      margin: 24px 0 10px;
      font-size: 19px;
    }

    .doc p, .doc li {
      line-height: 1.8;
      color: #26312e;
    }

    .doc ul, .doc ol {
      padding-left: 24px;
    }

    .doc pre,
    .code-view pre {
      overflow: auto;
      border-radius: 8px;
      background: var(--code-bg);
      color: var(--code-ink);
      padding: 18px;
      line-height: 1.65;
      font-size: 13px;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.06);
    }

    .doc code:not(pre code) {
      border-radius: 5px;
      background: #e8efeb;
      padding: 2px 5px;
      font-size: .92em;
    }

    .code-toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 14px;
      margin-bottom: 14px;
      padding-bottom: 14px;
      border-bottom: 1px solid var(--line);
    }

    .code-toolbar h2 {
      margin: 0;
      font-size: 24px;
    }

    .copy-btn {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--paper);
      color: var(--ink);
      cursor: pointer;
      padding: 9px 12px;
    }

    .copy-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    @media (max-width: 860px) {
      .topbar, .intro {
        grid-template-columns: 1fr;
      }

      .topbar {
        align-items: stretch;
      }

      .doc-layout {
        grid-template-columns: 1fr;
      }

      .doc-nav {
        position: static;
        display: flex;
        overflow-x: auto;
        border-right: 0;
        border-bottom: 1px solid var(--line);
      }

      .doc-nav button {
        width: auto;
        white-space: nowrap;
      }
    }
  </style>
</head>

    const decoder = new TextDecoder("utf-8");

    function decodeBase64(base64) {
      const binary = atob(base64);
      const bytes = new Uint8Array(binary.length);
      for (let i = 0; i < binary.length; i += 1) {
        bytes[i] = binary.charCodeAt(i);
      }
      return decoder.decode(bytes);
    }

    function escapeHtml(text) {
      return text
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    function renderInline(text) {
      return escapeHtml(text)
        .replace(/`([^`]+)`/g, "<code>$1</code>")
        .replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>");
    }

    function renderMarkdown(markdown) {
      const lines = markdown.replace(/\r\n/g, "\n").split("\n");
      const html = [];
      let inCode = false;
      let code = [];
      let inList = false;

      function closeList() {
        if (inList) {
          html.push("</ul>");
          inList = false;
        }
      }

      function flushCode() {
        html.push("<pre><code>" + escapeHtml(code.join("\n")) + "</code></pre>");
        code = [];
      }

      for (const line of lines) {
        if (line.startsWith("```")) {
          if (inCode) {
            flushCode();
            inCode = false;
          } else {
            closeList();
            inCode = true;
            code = [];
          }
          continue;
        }

        if (inCode) {
          code.push(line);
          continue;
        }

        if (/^###\s+/.test(line)) {
          closeList();
          html.push("<h3>" + renderInline(line.replace(/^###\s+/, "")) + "</h3>");
        } else if (/^##\s+/.test(line)) {
          closeList();
          html.push("<h2>" + renderInline(line.replace(/^##\s+/, "")) + "</h2>");
        } else if (/^#\s+/.test(line)) {
          closeList();
          html.push("<h1>" + renderInline(line.replace(/^#\s+/, "")) + "</h1>");
        } else if (/^\s*-\s+/.test(line)) {
          if (!inList) {
            html.push("<ul>");
            inList = true;
          }
          html.push("<li>" + renderInline(line.replace(/^\s*-\s+/, "")) + "</li>");
        } else if (line.trim() === "") {
          closeList();
        } else {
          closeList();
          html.push("<p>" + renderInline(line) + "</p>");
        }
      }

      closeList();
      if (inCode) flushCode();
      return html.join("\n");
    }

    function buildDocNav(docEl, navEl) {
      const headings = [...docEl.querySelectorAll("h1, h2")];
      navEl.innerHTML = "";
      headings.forEach((heading, index) => {
        const id = "section-" + index + "-" + heading.textContent.replace(/\s+/g, "-");
        heading.id = id;
        const btn = document.createElement("button");
        btn.type = "button";
        btn.textContent = heading.textContent;
        btn.addEventListener("click", () => heading.scrollIntoView({ behavior: "smooth", block: "start" }));
        navEl.appendChild(btn);
      });
    }

    function switchTab(tabName) {
      document.querySelectorAll(".tab").forEach((btn) => {
        btn.classList.toggle("active", btn.dataset.tab === tabName);
      });
      document.querySelectorAll(".section").forEach((section) => {
        section.classList.toggle("active", section.id === tabName);
      });
    }

    const originalIndex = decodeBase64(DATA.index);
    const readme = decodeBase64(DATA.readme);
    const guide = decodeBase64(DATA.guide);
    const code = decodeBase64(DATA.code);

    document.getElementById("calculatorFrame").srcdoc = originalIndex;
    document.getElementById("readmeDoc").innerHTML = renderMarkdown(readme);
    document.getElementById("guideDoc").innerHTML = renderMarkdown(guide);
    document.getElementById("codeBlock").textContent = code;

    buildDocNav(document.getElementById("readmeDoc"), document.getElementById("readmeNav"));
    buildDocNav(document.getElementById("guideDoc"), document.getElementById("guideNav"));

    document.querySelectorAll(".tab").forEach((btn) => {
      btn.addEventListener("click", () => switchTab(btn.dataset.tab));
    });

    document.getElementById("copyCode").addEventListener("click", async () => {
      await navigator.clipboard.writeText(code);
      const btn = document.getElementById("copyCode");
      btn.textContent = "已复制";
      setTimeout(() => { btn.textContent = "复制代码"; }, 1200);
    });
  </script>
